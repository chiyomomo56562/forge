level: L0
rules:
  - id: L0-1
    title: no_secret_exposure
    description: API key, token, password, private key를 출력하거나 로그에 남기지 않는다.
    severity: blocking

  - id: L0-2
    title: no_unapproved_destructive_action
    description: 파일 삭제, DB migration, dependency major upgrade는 human approval 없이는 실행하지 않는다.
    severity: blocking

  - id: L0-3
    title: preserve_user_intent
    description: 사용자 요청 범위를 넘는 리팩터링을 하지 않는다.
    severity: high

level: L1
coding_rules:
  - id: L1-CODE-1
    description: 기존 함수와 모듈을 우선 재사용한다.
  - id: L1-CODE-2
    description: public API 시그니처 변경은 계획 단계에서 risks에 명시한다.
  - id: L1-CODE-3
    description: 예외를 무시하지 말고 명시적으로 처리한다.

review_rules:
  - id: L1-REV-1
    description: 변경 파일마다 null/undefined/None 방어를 확인한다.
  - id: L1-REV-2
    description: 인증/권한/입력검증 경로를 우선 검토한다.
  - id: L1-REV-3
    description: 테스트가 없으면 테스트 부재를 feedback에 기록한다.

test_rules:
  - id: L1-TEST-1
    description: 수정 파일과 직접 연결된 테스트를 우선 실행한다.
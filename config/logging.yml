# ============================================================
# Logging Configuration
# 로그 레벨, 파일 경로, 포맷 정의
# ============================================================

version: 1
disable_existing_loggers: false

# --- Formatters ---
formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  detailed:
    format: "%(asctime)s [%(levelname)s] %(name)s:%(funcName)s:%(lineno)d: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  errors:
    format: "%(asctime)s [ERROR] %(name)s:%(funcName)s:%(lineno)d: %(message)s\n%(exc_info)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

# --- Handlers ---
handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  agent_file:
    class: logging.FileHandler
    level: DEBUG
    formatter: detailed
    filename: data/logs/agent.log
    mode: a
    encoding: utf-8

  error_file:
    class: logging.FileHandler
    level: ERROR
    formatter: errors
    filename: data/logs/errors.log
    mode: a
    encoding: utf-8

# --- Loggers ---
loggers:
  agent:
    level: DEBUG
    handlers: [console, agent_file, error_file]
    propagate: false

  agent.memory:
    level: DEBUG
    handlers: [console, agent_file]
    propagate: false

  agent.memory.episodic:
    level: DEBUG
    handlers: [agent_file]
    propagate: false

  agent.memory.semantic:
    level: DEBUG
    handlers: [agent_file]
    propagate: false

  agent.memory.procedural:
    level: DEBUG
    handlers: [agent_file]
    propagate: false

  agent.memory.constitution:
    level: DEBUG
    handlers: [console, agent_file]
    propagate: false

  agent.memory.identity:
    level: DEBUG
    handlers: [agent_file]
    propagate: false

  agent.cognition:
    level: DEBUG
    handlers: [agent_file]
    propagate: false

  agent.llm:
    level: INFO
    handlers: [agent_file]
    propagate: false

  agent.tools:
    level: INFO
    handlers: [agent_file]
    propagate: false

  agent.orchestrator:
    level: DEBUG
    handlers: [console, agent_file]
    propagate: false

# --- Root Logger ---
root:
  level: WARNING
  handlers: [console]
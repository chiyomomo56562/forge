# ============================================================
# L5 Identity — Self Model Configuration
# 에이전트의 초기 셀프 모델: 예측 편향, 칼리브레이션 기본값
# M14 (Agent Self-Model)의 YAML 기반 초기값
# ============================================================

version: 1

# --- 초기 예측 편향 (Prediction Bias) ---
# 에이전트가 자신의 능력을 평가할 때의 초기 경향.
# 이 값들은 아우터 루프를 통해 점진적으로 보정됨.
initial_bias:
  # overconfident: 자신의 능력을 과대평가 (예측 > 실제)
  # underconfident: 자신의 능력을 과소평가 (예측 < 실제)
  # calibrated: 예측과 실제가 잘 일치 (편차 < 0.05)
  direction: overconfident        # 초기 에이전트는 과신 경향이 있음 (굿하트의 법칙)
  default_predicted_success: 0.7  # 새로운 작업에 대한 초기 예측 성공 점수
  confidence_margin: 0.15         # 초기 과신 편향 마진 (예측 - 실제 평균)

# --- 칼리브레이션 설정 ---
calibration:
  threshold: 0.05                 # |예측 - 실제| < 0.05 → 'calibrated'
  alert_threshold: 0.2            # 편차 0.2 이상 → 자기 평가 신뢰도 저하 경고
  window_size: 50                 # 윈도우 통계 계산 기준 (최근 N개 에피소드)

# --- 윈도우 통계 초기값 ---
window_stats:
  avg_calibration_error: null     # 초기값: 데이터 없음 → null
  success_rate: null
  confidence_margin: null
  overconfident_ratio: null       # 윈도우 내 overconfident 에피소드 비율

# --- 코히어런스 인덱스 (M17) 초기값 ---
coherence_index:
  current: null                   # 초기값: 데이터 없음 → null
  cib_weight: 0.5                 # C = 0.5 × avg(CIB) + 0.5 × (1 - avg(calibration_error))
  calibration_weight: 0.5
  stagnation_delta: 0.01          # 코히어런스 변화량이 이 값 이하로 지속 → 정체

# --- 자기 인식 메타데이터 ---
meta:
  created_at: "2026-07-03T00:00:00Z"
  last_updated_by: "system_init"
  total_episodes: 0               # 총 에피소드 수 (아우터 루프가 갱신)
  total_reflections: 0            # 총 반성 수